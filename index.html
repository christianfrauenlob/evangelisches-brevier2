<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Evangelisches Brevier</title>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Cinzel:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --parchment: #f5f0e8; --ink: #1c1810; --ink-light: #3d3628;
    --rubric: #7a2020; --rule: #b8a882; --rule-light: #d9cfb8;
    --drop-cap: #5c3d1a; --margin-note: #6b5c3e;
    --bg-page: #ede7d9; --nav-bg: #2c2318; --nav-text: #d4c9a8;
    --nav-active: #c8a96e; --nav-section: rgba(200,169,110,.18);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg-page); font-family: 'EB Garamond', Georgia, serif; color: var(--ink); min-height: 100vh; }
  #sidebar { position: fixed; top: 0; left: 0; width: 260px; height: 100vh; background: var(--nav-bg); overflow-y: auto; z-index: 100; padding: 1.5rem 0 3rem; transition: transform .3s; }
  #sidebar h1 { font-family: 'Cinzel', serif; font-size: .72rem; letter-spacing: .14em; color: var(--nav-active); text-align: center; padding: 0 1rem 1.2rem; border-bottom: 1px solid rgba(200,169,110,.2); line-height: 1.6; }
  .kz-gruppe { margin-top: .8rem; }
  .kz-label { font-family: 'Cinzel', serif; font-size: .58rem; letter-spacing: .18em; text-transform: uppercase; color: rgba(212,201,168,.4); padding: .6rem 1.2rem .2rem; display: block; }
  .woche-kopf { padding: .35rem 1.2rem .1rem 1.2rem; font-family: 'EB Garamond', serif; font-size: .82rem; color: rgba(212,201,168,.55); font-style: italic; cursor: pointer; display: flex; justify-content: space-between; align-items: center; user-select: none; }
  .woche-tage { display: none; }
  .woche-tage.open { display: block; }
  .nav-tag { display: block; width: 100%; background: none; border: none; text-align: left; padding: .35rem 1.2rem .35rem 1.7rem; font-family: 'EB Garamond', serif; font-size: .9rem; color: var(--nav-text); cursor: pointer; }
  .nav-tag.active { background: var(--nav-section); color: var(--nav-active); border-left: 2px solid var(--nav-active); }
  #main { margin-left: 260px; padding: 3rem; }
  .codex { max-width: 660px; margin: 0 auto; background: var(--parchment); border: 1px solid var(--rule); padding: 3.5rem; }
  .rubric-label { font-size: .8rem; font-variant: small-caps; color: var(--rubric); display: block; margin: 1.4rem 0 .2rem; }
  .lied { background: rgba(180,155,100,.07); padding: 1rem; margin: 1rem 0; display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; }
  .gebet { background: rgba(120,90,50,.05); border-left: 3px solid var(--rubric); padding: 1rem; margin: 1rem 0; font-style: italic; }
</style>
</head>
<body>

<nav id="sidebar">
  <h1>Evangelisches<br>Brevier · Band I</h1>
  <div id="nav-content"><p style="padding:1rem">Lade Verzeichnis...</p></div>
</nav>

<main id="main">
  <div id="content"><div id="welcome"><h2>Willkommen</h2><p>Wähle einen Tag im Verzeichnis.</p></div></div>
</main>

<script>
  // 1. NEUE LADE-LOGIK
  async function holeBibelVerse(buchName, kapitel, vers) {
    const d = buchName.replace(" ", "_").toLowerCase() + ".json";
    try {
      const r = await fetch('data/bibel/' + d);
      const l = await r.json();
      return l.find(v => v.chapter == kapitel && v.verse == vers);
    } catch(e) { return null; }
  }

  // 2. INDEX & NAVIGATION
  async function loadIndex() {
    const r = await fetch('index.json');
    const idx = await r.json();
    let html = '';
    idx.wochen.forEach(w => {
      html += `<div class="woche-block"><div class="woche-kopf" onclick="toggleWoche('${w.id}')">${w.titel}</div>
               <div class="woche-tage" id="tage-${w.id}">...</div></div>`;
      prefillNav(w);
    });
    document.getElementById('nav-content').innerHTML = html;
  }

  async function prefillNav(w) {
    const r = await fetch('data/' + w.pfad + w.datei);
    const d = await r.json();
    document.getElementById('tage-'+w.id).innerHTML = d.tage.map(t => 
      `<button class="nav-tag" onclick="renderTagFromCache('${w.id}', '${t.id}')">${t.titel}</button>`).join('');
    window._cache = window._cache || {};
    window._cache[w.id] = d;
  }

  function renderTagFromCache(wId, tId) {
    const tag = window._cache[wId].tage.find(t => t.id === tId);
    renderTag(tag);
  }

  // 3. RENDER-LOGIK
  async function renderTag(tag) {
    let panels = '';
    for (const [s, inhalt] of Object.entries(tag.stunden)) {
      let bHtml = '';
      for(let b of inhalt) { bHtml += await renderBlock(b); }
      panels += `<h2>${s}</h2>` + bHtml;
    }
    document.getElementById('content').innerHTML = `<div class="codex"><h1>${tag.titel}</h1>${panels}</div>`;
  }

  async function renderBlock(b) {
    if (b.typ === 'lesung') {
      const v = await holeBibelVerse(b.buch, b.kapitel, b.verse);
      return `<p class="lesung"><strong>${b.buch} ${b.kapitel}:</strong> ${v ? esc(v.text) : '...'}</p>`;
    }
    return `<p>[${b.typ}]</p>`;
  }

  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  function toggleWoche(id) { document.getElementById('tage-'+id).classList.toggle('open'); }

  loadIndex();
</script>
</body>
</html>
